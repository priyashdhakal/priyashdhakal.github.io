# Build settings
markdown: kramdown
permalink: /blog/:title/
future: true

# Make posts available and set sane defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Keep the static homepage and large vendor assets out of Jekyll processing noise
exclude:
  - README.txt
  - LICENSE-free.txt
  - "*.map"
