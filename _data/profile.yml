about:
  - >
    I am a PhD Research Fellow in Bioinformatics at
    <strong><a href="https://www.jbnu.ac.kr/kor/" target="_blank">JBNU (Jeonbuk National University)</a></strong>,
    South Korea, working at the intersection of molecular biology, computer science, and data-driven modeling. My research centers on
    developing machine-learning and deep-learning methods to interpret biological sequence data &mdash; most recently, ensemble approaches
    for predicting miRNA&ndash;mRNA interactions.
  - >
    With a foundation in Computer Engineering (B.E., 2016) and prior experience across systems administration, networking, and software
    development, I bring an engineering mindset to computational biology. I am committed to rigorous, reproducible research and to translating
    algorithms into meaningful biological insight.

