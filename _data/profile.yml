about:
  - >
    I am a PhD Research Fellow in Bioinformatics at <strong><a href="https://www.jbnu.ac.kr/kor/" target="_blank">Jeonbuk National University (JBNU)</a></strong>,
    South Korea, working at the intersection of molecular biology, computer science, and statistical learning. My research develops machine- and 
    deep-learning models to decode high-dimensional biological sequence data and to uncover functional patterns in genomic and transcriptomic interactions.
  - >
    My path began in Computer Engineering (B.E., 2016), followed by hands-on roles in systems administration, networking, and full-stack
    software development. That engineering foundation shapes how I approach computational biology: building reproducible pipelines,
    writing clean and well-documented code in Python (PyTorch, TensorFlow, Keras), and validating models through rigorous, data-driven evaluation.
  - >
    My research interests span feature representation for genomic sequences, ensemble and deep learning, and the application of AI to
    problems in genomics and biomedical data. I am committed to open, reproducible science and to translating algorithms into meaningful
    biological insight.

