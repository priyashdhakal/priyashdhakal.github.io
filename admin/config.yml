# Decap CMS configuration
# NOTE: set `base_url` below to your deployed OAuth provider before logging in.
backend:
  name: github
  repo: priyashdhakal/priyashdhakal.github.io
  branch: master
  base_url: https://REPLACE-WITH-YOUR-OAUTH-PROVIDER   # e.g. https://decap-oauth.yourname.workers.dev

# Where uploaded images are stored in the repo / referenced on the site
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Friendlier editor URLs
site_url: https://priyashdhakal.com.np
display_url: https://priyashdhakal.com.np

collections:
  - name: posts
    label: "Blog Posts"
    label_singular: "Post"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}  —  {{date | date('MMM D, YYYY')}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", format: "YYYY-MM-DD HH:mm:ss +0900" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
